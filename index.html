<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
margin:0;
background:transparent;
font-family:Segoe UI,Arial;
}

.board{
width:360px;
position:relative;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 14px;
border-radius:14px;
margin-bottom:6px;
position:absolute;
width:100%;
box-sizing:border-box;
transition:transform .5s ease;
}

.gold{
background:linear-gradient(90deg,rgba(246,215,118,0.7),rgba(230,183,63,0.7));
box-shadow:0 0 20px rgba(255,215,0,0.7);
backdrop-filter:blur(6px);
}

.silver{
background:rgba(150,150,150,0.25);
backdrop-filter:blur(8px);
}

.flag{
width:28px;
margin-right:10px;
border-radius:4px;
}

.country{
display:flex;
align-items:center;
font-weight:700;
font-size:16px;
color:white;

text-shadow:
-2px -2px 0 #000,
2px -2px 0 #000,
-2px 2px 0 #000,
2px 2px 0 #000;
}

.score{
background:rgba(255,255,255,0.85);
padding:4px 12px;
border-radius:10px;
font-weight:bold;
font-size:14px;
color:black;
}

.crown{
font-size:18px;
margin-right:6px;
}

/* +30 animácia */

.points{
position:absolute;
right:60px;
font-weight:bold;
color:#00ff6a;
font-size:20px;

text-shadow:
-2px -2px 0 #000,
2px -2px 0 #000,
-2px 2px 0 #000,
2px 2px 0 #000;

animation:pop 1s forwards;
}

@keyframes pop{

0%{
opacity:0;
transform:translateY(10px) scale(0.8);
}

50%{
opacity:1;
transform:translateY(-10px) scale(1.2);
}

100%{
opacity:0;
transform:translateY(-25px) scale(1);
}

}

/* animácia keď sa zmení 1. miesto */

.leaderFlash{

animation:leader 1s;

}

@keyframes leader{

0%{
box-shadow:0 0 0px gold;
}

50%{
box-shadow:0 0 30px gold;
transform:scale(1.05);
}

100%{
box-shadow:0 0 20px rgba(255,215,0,0.7);
}

}

</style>

</head>

<body>

<div id="board" class="board"></div>

<script>

let countries=[

{name:"Slovakia",score:0,flag:"https://flagcdn.com/w40/sk.png"},
{name:"Czechia",score:0,flag:"https://flagcdn.com/w40/cz.png"},
{name:"Poland",score:0,flag:"https://flagcdn.com/w40/pl.png"},
{name:"Hungary",score:0,flag:"https://flagcdn.com/w40/hu.png"},
{name:"Croatia",score:0,flag:"https://flagcdn.com/w40/hr.png"},
{name:"Ukraine",score:0,flag:"https://flagcdn.com/w40/ua.png"},
{name:"Russia",score:0,flag:"https://flagcdn.com/w40/ru.png"},
{name:"Austria",score:0,flag:"https://flagcdn.com/w40/at.png"},
{name:"Germany",score:0,flag:"https://flagcdn.com/w40/de.png"},
{name:"Albania",score:0,flag:"https://flagcdn.com/w40/al.png"},
{name:"Switzerland",score:0,flag:"https://flagcdn.com/w40/ch.png"}

]

let previousLeader = null

const board=document.getElementById("board")

countries.forEach((c,i)=>{

let row=document.createElement("div")
row.className="row silver"
row.id=c.name

row.innerHTML=`

<div class="country">
<img class="flag" src="${c.flag}">
${c.name}
</div>

<div class="score">0</div>

`

board.appendChild(row)

})

function draw(){

countries.sort((a,b)=>b.score-a.score)

countries.forEach((c,i)=>{

let el=document.getElementById(c.name)

let y=i*50

el.style.transform=`translateY(${y}px)`

el.querySelector(".score").innerText=c.score

if(i==0){

el.classList.add("gold")
el.classList.remove("silver")

if(previousLeader!==c.name){

el.classList.add("leaderFlash")

setTimeout(()=>{
el.classList.remove("leaderFlash")
},1000)

previousLeader=c.name

}

}else{

el.classList.add("silver")
el.classList.remove("gold")

}

})

}

draw()

const socket=new WebSocket("ws://localhost:3000")

socket.onmessage=function(event){

let data=JSON.parse(event.data)

let c=countries.find(x=>x.name===data.country)

if(c){

c.score+=data.points

}

draw()

let el=document.getElementById(data.country)

if(el){

let pop=document.createElement("div")
pop.className="points"
pop.innerText="+"+data.points

el.appendChild(pop)

setTimeout(()=>{
pop.remove()
},1000)

}

}

</script>

</body>
</html>
